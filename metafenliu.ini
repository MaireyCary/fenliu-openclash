; ==========================================================
; 3) 兜底策略组
; ==========================================================
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🧭 手动选择`[]DIRECT
custom_proxy_group=🌐 Default`select`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]♻️ 自动选择`[]🧭 手动选择`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🌐 Default`[]DIRECT`[]♻️ 自动选择`[]🧊 冷门节点`[]🧭 手动选择`[]🚀 手动选择


; ==========================================================
; 4) 非标端口逻辑
; ==========================================================
custom_proxy_group=🔀 非标端口`select`[]🐟 遵循规则`[]DIRECT
custom_proxy_group=🐟 遵循规则`select`[]🐟 漏网之鱼


; ==========================================================
; 5) 核心节点生成逻辑（修改此部分以适配图片节点）
; ==========================================================
custom_proxy_group=🧭 手动选择`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`https://www.gstatic.com/generate_204`300,,50

# 香港：匹配含有 香港、HK 或 anytls 的节点
custom_proxy_group=🇭🇰 HK`url-test`(?i)香港|HK|HongKong|anytls`http://www.gstatic.com/generate_204`300,,50

# 台湾：匹配含有 台湾、TW 或 Hinet 的节点
custom_proxy_group=🇹🇼 TW`url-test`(?i)台湾|TW|Taiwan|Hinet`http://www.gstatic.com/generate_204`300,,50

# 日本：匹配含有 日本、JP 或 城市名
custom_proxy_group=🇯🇵 JP`url-test`(?i)日本|JP|Japan|Tokyo|Osaka`http://www.gstatic.com/generate_204`300,,50

# 新加坡：
custom_proxy_group=🇸🇬 SG`url-test`(?i)新加坡|SG|Singapore`http://www.gstatic.com/generate_204`300,,50

# 美国：补全了图片中的 亚特兰大(Atlanta) 和 凤凰城(Phoenix)
custom_proxy_group=🇺🇸 US`url-test`(?i)美国|US|United States|Atlanta|Phoenix|San Jose|Seattle|New York`http://www.gstatic.com/generate_204`300,,50

# 冷门节点：排除掉上述所有组中出现的关键词，剩下的（德国、英国、韩国等）自动归类在此
custom_proxy_group=🧊 冷门节点`select`^(?!.*(香港|HK|HongKong|anytls|台湾|TW|Taiwan|Hinet|日本|JP|Japan|Tokyo|Osaka|新加坡|SG|Singapore|美国|US|United States|Atlanta|Phoenix|San Jose|Seattle|New York)).*
