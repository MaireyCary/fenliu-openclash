; ==========================================================
; 3) 兜底策略组
; ==========================================================
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]🧭 手动选择`[]DIRECT
custom_proxy_group=🌐 Default`select`[]🇭🇰 HK`[]🇹🇼 TW`[]🇯🇵 JP`[]🇸🇬 SG`[]🇺🇸 US`[]🧊 冷门节点`[]♻️ 自动选择`[]🧭 手动选择`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🌐 Default`[]DIRECT`[]♻️ 自动选择`[]🧊 冷门节点`[]🧭 手动选择`[]🚀 手动选择


; ==========================================================
; 4) 非标端口逻辑
; ==========================================================
custom_proxy_group=🔀 非标端口`select`[]🐟 遵循规则`[]DIRECT
custom_proxy_group=🐟 遵循规则`select`[]🐟 漏网之鱼


; ==========================================================
; 5) 节点生成核心逻辑（已针对图片节点大幅增强兼容性）
; ==========================================================
custom_proxy_group=🧭 手动选择`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

# 香港：移除边界限制，强制匹配关键词
custom_proxy_group=🇭🇰 HK`url-test`(香港|HK|Hong|anytls)`http://www.gstatic.com/generate_204`300,,50

# 台湾：
custom_proxy_group=🇹🇼 TW`url-test`(台湾|TW|Tai|Hinet)`http://www.gstatic.com/generate_204`300,,50

# 日本：
custom_proxy_group=🇯🇵 JP`url-test`(日本|JP|Jap|Tokyo|Osaka)`http://www.gstatic.com/generate_204`300,,50

# 新加坡：
custom_proxy_group=🇸🇬 SG`url-test`(新加坡|SG|Sing)`http://www.gstatic.com/generate_204`300,,50

# 美国：补全了图片中的“凤凰城”和“亚特兰大”
custom_proxy_group=🇺🇸 US`url-test`(美国|US|United|States|Atlanta|Phoenix|Jose|Seattle|York)`http://www.gstatic.com/generate_204`300,,50

# 冷门节点：排除上述大区关键词后剩下的全部节点（如英国、德国、韩国）
custom_proxy_group=🧊 冷门节点`select`^(?!.*(香港|HK|Hong|anytls|台湾|TW|Tai|Hinet|日本|JP|Jap|Tokyo|Osaka|新加坡|SG|Sing|美国|US|United|States|Atlanta|Phoenix|Jose|Seattle|York)).*
